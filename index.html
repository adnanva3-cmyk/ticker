<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UltraWide Stock Ticker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --w: 5504px;
            --h: 602px;
            --bg-color: #000000;
            --panel-bg: rgba(24, 24, 27, 0.8);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #27272a;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        body {
            color: var(--text-main);
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #app-container {
            width: var(--w);
            height: var(--h);
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            transform-origin: center center;
            /* Will be scaled by JS */
        }

        /* Background Grid */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 800px;
            height: 100%;
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            flex-shrink: 0;
        }

        .brand-container {
            margin-bottom: 32px;
        }

        .brand-logo-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-bottom: 8px;
        }

        /* Fallback styling if image is missing */
        .brand-logo-text {
            font-family: 'Nunito', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: white;
            line-height: 1;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .brand-icon-svg {
            width: 64px;
            height: 64px;
        }

        .brand-tagline {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            color: #d4d4d8;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-left: 4px;
        }

        .ticker-symbol {
            font-size: 8rem; /* 9xl equiv */
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .ticker-name {
            font-size: 2.25rem; /* 4xl equiv */
            color: var(--text-muted);
            font-weight: 300;
            margin: 8px 0 0 0;
        }

        .price-container {
            margin-top: 20px;
        }

        .current-price {
            font-size: 140px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.025em;
        }

        .currency {
            font-size: 2.25rem;
            color: #71717a;
            font-weight: 600;
            margin-left: 16px;
        }

        .change-row {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 3rem;
            font-weight: 700;
            margin-top: 16px;
        }

        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
        }

        .stat-label {
            color: #71717a;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-value {
            font-family: monospace;
            font-size: 2.25rem;
            font-weight: 600;
        }

        .footer {
            margin-top: auto;
            padding-top: 32px;
            display: flex;
            align-items: center;
            color: #71717a;
        }

        .time-display {
            font-family: monospace;
            font-size: 1.5rem;
            margin-left: 16px;
        }

        .status-indicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Main Content */
        .main-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #000, #18181b);
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        #stockChart {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Watermark Logo */
        .watermark {
            position: absolute;
            top: 32px;
            right: 32px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .watermark img {
            height: 48px;
            width: auto;
        }
        
        .watermark-text {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Media Player */
        .media-player {
            position: absolute;
            bottom: 32px;
            right: 32px;
            width: 400px;
            height: 225px;
            background-color: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid #3f3f46;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .media-player.expanded {
            width: 800px;
            height: 450px;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .media-player:hover .controls-overlay,
        .media-player:hover .top-controls {
            opacity: 1;
        }

        .top-controls {
            position: absolute;
            top: 0;
            right: 0;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-play {
            background: white;
            color: black;
            padding: 12px;
        }
        .btn-play:hover {
            background: #f4f4f5;
            transform: scale(1.05);
        }

        /* SVG Icons */
        .icon {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div class="grid-bg"></div>

        <!-- Sidebar -->
        <div class="sidebar">
        <div>
            <!-- Brand Logo Area -->
            <div class="brand-container">

                            <path d="M50 50C50 50 35 10 15 15C-5 20 10 50 50 50Z" fill="url(#grad2)"/>
                            <path d="M50 50C50 50 65 10 85 15C105 20 90 50 50 50Z" fill="url(#grad3)"/>

                                    <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />

                        }

            </div>

            <h1 class="ticker-symbol" id="symbol">NVDA</h1>
            <p class="ticker-name" id="name">NVIDIA Corporation</p>
        </div>

        <div class="price-container">
            <div style="display: flex; align-items: baseline;">
                <span class="current-price" id="currentPrice">0.00</span>
                <span class="currency">USD</span>
            </div>
            <div class="change-row" id="changeRow">
                <svg class="icon" id="arrowIcon" viewBox="0 0 24 24"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                <span id="changeValue">0.00</span>
                <span id="changePercent" style="opacity: 0.6; font-size: 0.8em;">(0.00%)</span>
            </div>
        </div>
    </div>

    <!-- Main Chart -->
    <div class="main-content">
        <!-- Watermark -->
        <div class="watermark">
             <img src="icon.png" alt="Logo" onerror="this.style.display='none'">
             <div class="watermark-text">BeBright</div>
        </div>

        <!-- Multi-Asset Legend -->
        <div class="chart-legend" id="chartLegend">
            <!-- Populated by JS -->
        </div>

        <canvas id="stockChart"></canvas>
        
        <!-- Market Wall Overlay -->
        <div class="market-wall-overlay">
            <div class="widgets-zone">
                <div class="widgets-track" id="widgetsTrack">
                    <div class="widgets-set" id="widgetsSetA"></div>

                    <div class="news-set" id="newsSetA"></div>

                </div>
            </div>
        </div>
        
        <!-- Media Player -->
        <div class="media-player" id="mediaPlayer">
            <div class="top-controls">
                <button class="btn-icon" id="btnExpand">
                    <svg class="icon" viewBox="0 0 24 24" style="width: 16px; height: 16px;"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
                </button>

                <video id="videoElement" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" loop muted playsinline></video>

                    </button>
                    <div style="flex: 1; margin: 0 12px;">
                        <div style="font-size: 12px; color: #d4d4d8; margin-bottom: 4px;">Live Feed</div>

                        </div>

                    </button>
                    <label class="btn-icon" style="cursor: pointer;">
                        <input type="file" id="fileInput" accept="video/*,audio/*" style="display: none;">
                        <svg class="icon" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    </label>
                </div>
            </div>
        </div>
    </div>
    </div> <!-- Close app-container -->

    <style>
        /* Add Legend Styles */
        .chart-legend {
            position: absolute;
            top: 32px;
            left: 32px;
            background-color: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 24px;
            z-index: 20;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
        }

        .legend-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-symbol {
            font-weight: 700;
            font-size: 0.9rem;
            color: #e4e4e7;
        }

        .legend-price {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        .legend-change {
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ===== MARKET WALL OVERLAY ===== */
        .market-wall-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5; /* Above canvas (z=0), below sidebar (z=10) */
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Let clicks pass through to canvas/video if needed */
        }

        /* Allow pointer events on widgets if they are interactive */
        .widgets-zone, .news-zone {
            pointer-events: auto;
        }

        :root {
            /* Market Wall Variables */
            --newsH: 200px;
            --topH: calc(var(--h) - var(--newsH));
            --tileW: 420px;
            --tileGap: 18px;
            --newsFont: 48px;
            --newsSpace: 30px;
            
            /* animated via JS */
            --widgetsScroll: 2000px;
            --widgetsDuration: 120s;
            --newsScroll: 2000px;
            --newsDuration: 90s;
        }

        /* ===== WIDGETS ===== */
        .widgets-zone {
            height: var(--topH);
            overflow: hidden;
            width: 100%;
        }

        .widgets-track {
            display: flex;
            gap: var(--tileGap);
            height: 100%;
            animation: widgetsScroll var(--widgetsDuration) linear infinite;
            will-change: transform;
        }

        .widgets-set {
            display: flex;
            gap: var(--tileGap);
            height: 100%;
        }

        .tile {
            width: var(--tileW);
            height: 100%;
            display: flex;
            flex-direction: column;
            /* Ensure tiles have background or are transparent as desired */
            /* background: rgba(0,0,0,0.5); */ 
        }

        .tile-title {
            color: #fff;
            font-size: 30px;
            font-weight: 800;
            padding: 14px 6px 6px;
            text-transform: uppercase;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .tile-widget {
            flex: 1;
            padding: 0 6px 10px;
            box-sizing: border-box;
        }

        .tile-widget iframe,
        .tile-widget div {
            width: 100%!important;
            height: 100%!important;
            border: 0!important;
            display: block;
        }

        @keyframes widgetsScroll {
            from { transform: translateX(0); }
            to { transform: translateX(calc(-1 * var(--widgetsScroll))); }
        }

        /* ===== NEWS ===== */
        .news-zone {
            height: var(--newsH);
            overflow: hidden;
            display: flex;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,.15);
            background: rgba(0,0,0,0.6); /* Semi-transparent background for readability */
            backdrop-filter: blur(8px);
        }

        .news-track {
            display: flex;
            animation: newsScroll var(--newsDuration) linear infinite;
            will-change: transform;
        }

        .news-set {
            display: flex;
            align-items: center;
        }

        .news-item {
            color: #fff;
            font-size: var(--newsFont);
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: .5px;
            padding: 0 var(--newsSpace);
        }

        .news-sep {
            color: rgba(255,255,255,.45);
            font-size: var(--newsFont);
            padding: 0 var(--newsSpace);
        }

        @keyframes newsScroll {
            from { transform: translateX(0); }
            to { transform: translateX(calc(-1 * var(--newsScroll))); }
        }
    </style>

    <script>
        // --- Auto-Scaling Logic ---
        function scaleApp() {
            const container = document.getElementById('app-container');
            if (!container) return;
            
            const rootStyle = getComputedStyle(document.documentElement);
            const targetWidth = parseInt(rootStyle.getPropertyValue('--w'));
            const targetHeight = parseInt(rootStyle.getPropertyValue('--h'));
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            const scaleX = windowWidth / targetWidth;
            const scaleY = windowHeight / targetHeight;
            
            // Fit within viewport (letterbox)
            const scale = Math.min(scaleX, scaleY);
            
            container.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', scaleApp);
        window.addEventListener('load', scaleApp);
        // Call immediately
        scaleApp();

        // --- MARKET WALL LOGIC ---
        /* ===== MARKET DATA ===== */
        const widgetItems = [
            {title:"🟡 GOLD XAU / USD", symbol:"OANDA:XAUUSD"},
            {title:"⚪ SILVER XAG / USD", symbol:"OANDA:XAGUSD"},
            {title:"BTC / USD",         symbol:"BITSTAMP:BTCUSD"},
            {title:"AED / PKR",         symbol:"FX_IDC:AEDPKR"},
            {title:"AED / INR",         symbol:"FX_IDC:AEDINR"},
            {title:"AED / LKR",         symbol:"FX_IDC:AEDLKR"},
            {title:"GBP / AED",         symbol:"FX_IDC:GBPAED"},
            {title:"AED / RUB",         symbol:"FX_IDC:AEDRUB"}
        ];

        function createWidget(item){
            const tile = document.createElement("div");
            tile.className = "tile";

            tile.innerHTML = `
                <div class="tile-title">${item.title}</div>
                <div class="tile-widget tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                </div>
            `;

            const script = document.createElement("script");
            script.src   = "https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js";
            script.async = true;

            // ✅ timezone added
            script.innerHTML = JSON.stringify({
                symbol: item.symbol,
                width: "100%",
                height:"100%",
                locale:"en",
                dateRange:"1D",
                colorTheme:"dark",
                isTransparent:true,
                timezone:"Asia/Dubai"
            });

            tile.querySelector(".tile-widget").appendChild(script);
            return tile;
        }

        /* ===== NEWS DATA (INLINE) ===== */
        const newsItems = [
            "UAE markets: investors watch regional FX demand and remittance flows",
            "Gold holds near key levels as traders weigh inflation expectations",
            "Bitcoin volatility remains elevated amid macro headlines",
            "GBP/AED traders monitor UK rate expectations",
            "South Asia FX reacts to import costs and policy signals",
            "MENA markets track global yields and energy headlines"
        ];

        function createNews(text){
            const el = document.createElement("div");
            el.className = "news-item";
            el.textContent = text;
            return el;
        }
        function createSep(){
            const el = document.createElement("div");
            el.className = "news-sep";
            el.textContent = "|";
            return el;
        }

        /* ===== RENDER + SEAMLESS LOOP ===== */
        function setupWidgets(){
            const track = document.getElementById("widgetsTrack");
            const setA  = document.getElementById("widgetsSetA");
            const setB  = document.getElementById("widgetsSetB");
            
            if (!track || !setA || !setB) return;

            setA.innerHTML = "";
            setB.innerHTML = "";

            widgetItems.forEach(w => setA.appendChild(createWidget(w)));
            widgetItems.forEach(w => setB.appendChild(createWidget(w)));

            requestAnimationFrame(() => {
                const dist = setA.getBoundingClientRect().width + (parseFloat(getComputedStyle(track).gap) || 0);
                document.documentElement.style.setProperty("--widgetsScroll", dist + "px");

                const speed = 90; // px/sec
                document.documentElement.style.setProperty("--widgetsDuration", (dist/speed) + "s");
            });
        }

        function buildNewsSet(container){
            newsItems.forEach((n,i) => {
                container.appendChild(createNews(n));
                if (i !== newsItems.length - 1) container.appendChild(createSep());
            });
        }

        function setupNews(){
            const setA = document.getElementById("newsSetA");
            const setB = document.getElementById("newsSetB");
            
            if (!setA || !setB) return;

            setA.innerHTML = "";
            setB.innerHTML = "";

            buildNewsSet(setA);
            buildNewsSet(setB);

            requestAnimationFrame(() => {
                const dist = setA.getBoundingClientRect().width;
                document.documentElement.style.setProperty("--newsScroll", dist + "px");

                const speed = 140; // px/sec
                document.documentElement.style.setProperty("--newsDuration", (dist/speed) + "s");
            });
        }

        window.addEventListener("load", () => {
            setupWidgets();
            setupNews();
        });
        window.addEventListener("resize", () => {
            setupWidgets();
            setupNews();
        });

        // --- Configuration ---
        const MAX_POINTS = 2000;
        
        // Define multiple assets
        const ASSETS = [
            { id: 'NVDA', name: 'NVIDIA', price: 450.00, volatility: 0.002, color: 'dynamic', isPrimary: true },
            { id: 'BTC', name: 'Bitcoin', price: 64230.50, volatility: 0.003, color: '#f59e0b', isPrimary: false },
            { id: 'EUR', name: 'EUR/USD', price: 1.0845, volatility: 0.0005, color: '#3b82f6', isPrimary: false },
            { id: 'GBP', name: 'GBP/USD', price: 1.2630, volatility: 0.0006, color: '#8b5cf6', isPrimary: false }
        ];

        // --- State ---
        // Structure: { 'NVDA': [{time, price}, ...], 'BTC': [...] }
        let marketData = {};
        
        // --- DOM Elements ---
        const els = {
            price: document.getElementById('currentPrice'),
            change: document.getElementById('changeValue'),
            percent: document.getElementById('changePercent'),
            arrow: document.getElementById('arrowIcon'),
            changeRow: document.getElementById('changeRow'),
            canvas: document.getElementById('stockChart'),
            legend: document.getElementById('chartLegend')
        };

        // --- Chart Setup ---
        const ctx = els.canvas.getContext('2d');
        let width, height;

        function resizeCanvas() {
            const parent = els.canvas.parentElement;
            width = parent.clientWidth;
            height = parent.clientHeight;
            els.canvas.width = width;
            els.canvas.height = height;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        console.log(`App Dimensions: ${document.body.clientWidth}x${document.body.clientHeight}`);

        // --- Data Logic ---
        function initData() {
            const now = Date.now();
            
            // Initialize with a single point for each asset
            ASSETS.forEach(asset => {
                marketData[asset.id] = [{ time: now, price: asset.price }];
                asset.currentPrice = asset.price;
            });
            
            updateStats();
            updateLegend();
        }

        function updateData() {
            const now = Date.now();

            ASSETS.forEach(asset => {
                const lastPrice = marketData[asset.id][marketData[asset.id].length - 1].price;
                const change = lastPrice * (Math.random() * asset.volatility * 2 - asset.volatility + 0.00005);
                const newPrice = Math.max(0.01, lastPrice + change);
                
                asset.currentPrice = newPrice;
                marketData[asset.id].push({ time: now, price: newPrice });
                
                if (marketData[asset.id].length > MAX_POINTS) {
                    marketData[asset.id].shift();
                }
            });
            
            updateStats();
            updateLegend();
            drawChart();
        }

        function updateStats() {
            const primary = ASSETS.find(a => a.isPrimary);
            const history = marketData[primary.id];
            const startPrice = history[0].price;
            const currentPrice = primary.currentPrice;
            const change = currentPrice - startPrice;
            const percent = (change / startPrice) * 100;
            const isPos = change >= 0;

            els.price.textContent = currentPrice.toFixed(2);
            els.change.textContent = (isPos ? '+' : '') + change.toFixed(2);
            els.percent.textContent = `(${percent.toFixed(2)}%)`;
            
            els.changeRow.className = `change-row ${isPos ? 'positive' : 'negative'}`;
            els.arrow.innerHTML = isPos 
                ? '<line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline>' 
                : '<line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline>';
        }

        function updateLegend() {
            // Re-render legend items
            // We only do this efficiently by updating text if exists, or creating if not
            // For simplicity in vanilla JS, we'll clear and rebuild or just update values
            
            if (els.legend.children.length === 0) {
                // Initial build
                ASSETS.forEach(asset => {
                    if (asset.isPrimary) return; // Skip primary in legend (it's on sidebar)
                    
                    const div = document.createElement('div');
                    div.className = 'legend-item';
                    div.id = `legend-${asset.id}`;
                    div.innerHTML = `
                        <div class="legend-header">
                            <div class="legend-dot" style="background-color: ${asset.color}"></div>
                            <span class="legend-symbol">${asset.id}</span>
                        </div>
                        <div class="legend-price">0.00</div>
                        <div class="legend-change">0.00%</div>
                    `;
                    els.legend.appendChild(div);
                });
            }

            // Update values
            ASSETS.forEach(asset => {
                if (asset.isPrimary) return;
                
                const el = document.getElementById(`legend-${asset.id}`);
                if (el) {
                    const history = marketData[asset.id];
                    const start = history[0].price;
                    const current = asset.currentPrice;
                    const changePct = ((current - start) / start) * 100;
                    const isPos = changePct >= 0;
                    
                    el.querySelector('.legend-price').textContent = current.toFixed(asset.id.includes('USD') && !asset.id.includes('BTC') ? 4 : 2);
                    const changeEl = el.querySelector('.legend-change');
                    changeEl.textContent = (isPos ? '+' : '') + changePct.toFixed(2) + '%';
                    changeEl.style.color = isPos ? '#10b981' : '#ef4444';
                }
            });
        }

        // --- Drawing Logic ---
        function drawChart() {
            // We need to normalize all charts to Percentage Change relative to their own start point
            // This allows them to share the same Y-axis scale
            
            ctx.clearRect(0, 0, width, height);

            // 1. Calculate % change history for all assets
            // And find the global min/max % change to scale the graph
            let minPct = 0;
            let maxPct = 0;

            const normalizedData = {}; // { 'NVDA': [0, 0.1, -0.2, ...], ... }

            ASSETS.forEach(asset => {
                const history = marketData[asset.id];
                const startPrice = history[0].price;
                const pctHistory = history.map(pt => (pt.price - startPrice) / startPrice);
                
                normalizedData[asset.id] = pctHistory;
                
                const localMin = Math.min(...pctHistory);
                const localMax = Math.max(...pctHistory);
                minPct = Math.min(minPct, localMin);
                maxPct = Math.max(maxPct, localMax);
            });

            // Add padding
            const range = maxPct - minPct;
            const padding = range * 0.1 || 0.01; // Default padding if flat
            const yMin = minPct - padding;
            const yMax = maxPct + padding;
            const yRange = yMax - yMin;

            // Helper to map index/value to x/y
            const stepX = width / (MAX_POINTS - 1);
            const getY = (pct) => height - ((pct - yMin) / yRange) * height;

            // 2. Draw Zero Line
            const zeroY = getY(0);
            ctx.beginPath();
            ctx.moveTo(0, zeroY);
            ctx.lineTo(width, zeroY);
            ctx.strokeStyle = '#3f3f46';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 3. Draw Secondary Assets first (so Primary is on top)
            ASSETS.forEach(asset => {
                if (asset.isPrimary) return;
                
                const data = normalizedData[asset.id];
                ctx.beginPath();
                data.forEach((pct, i) => {
                    const x = i * stepX;
                    const y = getY(pct);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = asset.color;
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // 4. Draw Primary Asset (Filled Area)
            const primary = ASSETS.find(a => a.isPrimary);
            const pData = normalizedData[primary.id];
            const isPos = pData[pData.length - 1] >= 0;
            const pColor = isPos ? '#10b981' : '#ef4444';

            // Area
            ctx.beginPath();
            ctx.moveTo(0, height); // Bottom left (technically should be zeroY if we want fill to zero, but fill to bottom looks better for "Area")
            // Actually, let's fill to bottom for the "Area" look
            
            pData.forEach((pct, i) => {
                const x = i * stepX;
                const y = getY(pct);
                ctx.lineTo(x, y);
            });
            ctx.lineTo((pData.length - 1) * stepX, height);
            ctx.closePath();

            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, isPos ? 'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();

            // Line
            ctx.beginPath();
            pData.forEach((pct, i) => {
                const x = i * stepX;
                const y = getY(pct);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = pColor;
            ctx.lineWidth = 4;
            ctx.shadowColor = pColor;
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // --- Media Player Logic ---
        const video = document.getElementById('videoElement');
        const btnPlay = document.getElementById('btnPlay');
        const btnMute = document.getElementById('btnMute');
        const btnExpand = document.getElementById('btnExpand');
        const fileInput = document.getElementById('fileInput');
        const mediaPlayer = document.getElementById('mediaPlayer');
        const muteIcon = document.getElementById('muteIcon');

        let isPlaying = false;

        btnPlay.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                btnPlay.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>'; // Pause icon
            } else {
                video.pause();
                btnPlay.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>'; // Play icon
            }
        });

        btnMute.addEventListener('click', () => {
            video.muted = !video.muted;
            if (video.muted) {
                muteIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
            } else {
                muteIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
            }
        });

        btnExpand.addEventListener('click', () => {
            mediaPlayer.classList.toggle('expanded');
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                video.play();
                btnPlay.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            }
        });

        // --- Initialization ---
        initData();
        setInterval(updateData, 1000);

        // Auto-play video if possible
        video.play().then(() => {
            isPlaying = true;
            btnPlay.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
        }).catch(() => {
            // Autoplay blocked
        });

    </script>
</body>
</html>
