<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UltraWide Stock Ticker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --w: 5504px;
            --h: 602px;
            --bg-color: #000000;
            --panel-bg: rgba(24, 24, 27, 0.8);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --border-color: #27272a;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        body {
            color: var(--text-main);
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #app-container {
            width: var(--w);
            height: var(--h);
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            transform-origin: center center;
            /* Will be scaled by JS */
        }

        /* Background Grid */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        /* Sidebar */
        .sidebar {
            width: 800px;
            height: 100%;
            background-color: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            padding: 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
            flex-shrink: 0;
        }

        .brand-container {
            margin-bottom: 32px;
        }

        .brand-logo-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin-bottom: 8px;
        }

        /* Fallback styling if image is missing */
        .brand-logo-text {
            font-family: 'Nunito', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: white;
            line-height: 1;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .brand-icon-svg {
            width: 64px;
            height: 64px;
        }

        .brand-tagline {
            font-family: 'Nunito', sans-serif;
            font-size: 1.2rem;
            color: #d4d4d8;
            font-weight: 300;
            letter-spacing: 0.05em;
            margin-left: 4px;
        }

        .ticker-symbol {
            font-size: 8rem; /* 9xl equiv */
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -0.05em;
        }

        .ticker-name {
            font-size: 2.25rem; /* 4xl equiv */
            color: var(--text-muted);
            font-weight: 300;
            margin: 8px 0 0 0;
        }

        .price-container {
            margin-top: 20px;
        }

        .current-price {
            font-size: 140px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.025em;
        }

        .currency {
            font-size: 2.25rem;
            color: #71717a;
            font-weight: 600;
            margin-left: 16px;
        }

        .change-row {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 3rem;
            font-weight: 700;
            margin-top: 16px;
        }

        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 32px;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid var(--border-color);
        }

        .stat-label {
            color: #71717a;
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-value {
            font-family: monospace;
            font-size: 2.25rem;
            font-weight: 600;
        }

        .footer {
            margin-top: auto;
            padding-top: 32px;
            display: flex;
            align-items: center;
            color: #71717a;
        }

        .time-display {
            font-family: monospace;
            font-size: 1.5rem;
            margin-left: 16px;
        }

        .status-indicator {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Main Content */
        .main-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #000, #18181b);
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        #stockChart {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* Watermark Logo */
        .watermark {
            position: absolute;
            top: 32px;
            right: 32px;
            opacity: 0.5;
            pointer-events: none;
            z-index: 5;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .watermark img {
            height: 48px;
            width: auto;
        }
        
        .watermark-text {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 24px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        /* Media Player */
        .media-player {
            position: absolute;
            bottom: 32px;
            right: 32px;
            width: 400px;
            height: 225px;
            background-color: rgba(24, 24, 27, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid #3f3f46;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.5s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 50;
        }

        .media-player.expanded {
            width: 800px;
            height: 450px;
        }

        .video-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .media-player:hover .controls-overlay,
        .media-player:hover .top-controls {
            opacity: 1;
        }

        .top-controls {
            position: absolute;
            top: 0;
            right: 0;
            padding: 16px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 10;
        }

        .btn-icon {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-play {
            background: white;
            color: black;
            padding: 12px;
        }
        .btn-play:hover {
            background: #f4f4f5;
            transform: scale(1.05);
        }

        /* SVG Icons */
        .icon {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }
    </style>
</head>

    <style>
        /* Add Legend Styles */
        .chart-legend {
            position: absolute;
            top: 32px;
            left: 32px;
            background-color: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            gap: 24px;
            z-index: 20;
        }

        .legend-item {
            display: flex;
            flex-direction: column;
        }

        .legend-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-symbol {
            font-weight: 700;
            font-size: 0.9rem;
            color: #e4e4e7;
        }

        .legend-price {
            font-family: monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        .legend-change {
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>

    <script>
        // --- Auto-Scaling Logic ---
        function scaleApp() {
            const container = document.getElementById('app-container');
            if (!container) return;
            
            const rootStyle = getComputedStyle(document.documentElement);
            const targetWidth = parseInt(rootStyle.getPropertyValue('--w'));
            const targetHeight = parseInt(rootStyle.getPropertyValue('--h'));
            
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            const scaleX = windowWidth / targetWidth;
            const scaleY = windowHeight / targetHeight;
            
            // Fit within viewport (letterbox)
            const scale = Math.min(scaleX, scaleY);
            
            container.style.transform = `scale(${scale})`;
        }

        window.addEventListener('resize', scaleApp);
        window.addEventListener('load', scaleApp);
        // Call immediately
        scaleApp();

        // --- Configuration ---
        const MAX_POINTS = 2000;
        
        // Define multiple assets
        const ASSETS = [
            { id: 'NVDA', name: 'NVIDIA', price: 450.00, volatility: 0.002, color: 'dynamic', isPrimary: true },
            { id: 'BTC', name: 'Bitcoin', price: 64230.50, volatility: 0.003, color: '#f59e0b', isPrimary: false },
            { id: 'EUR', name: 'EUR/USD', price: 1.0845, volatility: 0.0005, color: '#3b82f6', isPrimary: false },
            { id: 'GBP', name: 'GBP/USD', price: 1.2630, volatility: 0.0006, color: '#8b5cf6', isPrimary: false }
        ];

        // --- State ---
        // Structure: { 'NVDA': [{time, price}, ...], 'BTC': [...] }
        let marketData = {};
        let volume = 15000000;
        let dayHigh = ASSETS[0].price;
        let dayLow = ASSETS[0].price;
        
        // --- DOM Elements ---
        const els = {
            price: document.getElementById('currentPrice'),
            change: document.getElementById('changeValue'),
            percent: document.getElementById('changePercent'),
            arrow: document.getElementById('arrowIcon'),
            changeRow: document.getElementById('changeRow'),
            volume: document.getElementById('volume'),
            high: document.getElementById('dayHigh'),
            low: document.getElementById('dayLow'),
            clock: document.getElementById('clock'),
            canvas: document.getElementById('stockChart'),
            legend: document.getElementById('chartLegend')
        };

        // --- Chart Setup ---
        const ctx = els.canvas.getContext('2d');
        let width, height;

        function resizeCanvas() {
            const parent = els.canvas.parentElement;
            width = parent.clientWidth;
            height = parent.clientHeight;
            els.canvas.width = width;
            els.canvas.height = height;
        }
        
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        console.log(`App Dimensions: ${document.body.clientWidth}x${document.body.clientHeight}`);

        // --- Data Logic ---
        function initData() {
            const now = Date.now();
            
            // Initialize empty arrays for each asset
            ASSETS.forEach(asset => {
                marketData[asset.id] = [];
                let currentP = asset.price;
                
                // Generate history backwards
                // We generate a temporary array then reverse it to push correctly
                let tempHistory = [];
                for (let i = 0; i < MAX_POINTS; i++) {
                    // Random walk
                    const change = currentP * (Math.random() * asset.volatility * 2 - asset.volatility + 0.0001);
                    currentP = Math.max(0.01, currentP - change); // Reverse walk logic roughly
                    tempHistory.push({ time: now - i * 1000, price: currentP });
                }
                // Reverse so index 0 is oldest, index length-1 is newest (now)
                marketData[asset.id] = tempHistory.reverse();
                
                // Reset current price to the "latest" generated point
                // Actually, let's just set the asset.currentPrice to the last point
                asset.currentPrice = marketData[asset.id][marketData[asset.id].length - 1].price;
            });
            
            updateStats();
            updateLegend();
        }

        function updateData() {
            const now = Date.now();

            ASSETS.forEach(asset => {
                const lastPrice = marketData[asset.id][marketData[asset.id].length - 1].price;
                const change = lastPrice * (Math.random() * asset.volatility * 2 - asset.volatility + 0.00005);
                const newPrice = Math.max(0.01, lastPrice + change);
                
                asset.currentPrice = newPrice;
                marketData[asset.id].push({ time: now, price: newPrice });
                
                if (marketData[asset.id].length > MAX_POINTS) {
                    marketData[asset.id].shift();
                }

                // Update primary stats if it's the primary asset
                if (asset.isPrimary) {
                    volume += Math.floor(Math.random() * 5000);
                    dayHigh = Math.max(dayHigh, newPrice);
                    dayLow = Math.min(dayLow, newPrice);
                }
            });
            
            updateStats();
            updateLegend();
            drawChart();
        }

        function updateStats() {
            const primary = ASSETS.find(a => a.isPrimary);
            const history = marketData[primary.id];
            const startPrice = history[0].price;
            const currentPrice = primary.currentPrice;
            const change = currentPrice - startPrice;
            const percent = (change / startPrice) * 100;
            const isPos = change >= 0;

            els.price.textContent = currentPrice.toFixed(2);
            els.change.textContent = (isPos ? '+' : '') + change.toFixed(2);
            els.percent.textContent = `(${percent.toFixed(2)}%)`;
            
            els.changeRow.className = `change-row ${isPos ? 'positive' : 'negative'}`;
            els.arrow.innerHTML = isPos 
                ? '<line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline>' 
                : '<line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline>';

            els.volume.textContent = volume.toLocaleString();
            els.high.textContent = dayHigh.toFixed(2);
            els.low.textContent = dayLow.toFixed(2);
        }

        function updateLegend() {
            // Re-render legend items
            // We only do this efficiently by updating text if exists, or creating if not
            // For simplicity in vanilla JS, we'll clear and rebuild or just update values
            
            if (els.legend.children.length === 0) {
                // Initial build
                ASSETS.forEach(asset => {
                    if (asset.isPrimary) return; // Skip primary in legend (it's on sidebar)
                    
                    const div = document.createElement('div');
                    div.className = 'legend-item';
                    div.id = `legend-${asset.id}`;
                    div.innerHTML = `
                        <div class="legend-header">
                            <div class="legend-dot" style="background-color: ${asset.color}"></div>
                            <span class="legend-symbol">${asset.id}</span>
                        </div>
                        <div class="legend-price">0.00</div>
                        <div class="legend-change">0.00%</div>
                    `;
                    els.legend.appendChild(div);
                });
            }

            // Update values
            ASSETS.forEach(asset => {
                if (asset.isPrimary) return;
                
                const el = document.getElementById(`legend-${asset.id}`);
                if (el) {
                    const history = marketData[asset.id];
                    const start = history[0].price;
                    const current = asset.currentPrice;
                    const changePct = ((current - start) / start) * 100;
                    const isPos = changePct >= 0;
                    
                    el.querySelector('.legend-price').textContent = current.toFixed(asset.id.includes('USD') && !asset.id.includes('BTC') ? 4 : 2);
                    const changeEl = el.querySelector('.legend-change');
                    changeEl.textContent = (isPos ? '+' : '') + changePct.toFixed(2) + '%';
                    changeEl.style.color = isPos ? '#10b981' : '#ef4444';
                }
            });
        }

        // --- Drawing Logic ---
        function drawChart() {
            // We need to normalize all charts to Percentage Change relative to their own start point
            // This allows them to share the same Y-axis scale
            
            ctx.clearRect(0, 0, width, height);

            // 1. Calculate % change history for all assets
            // And find the global min/max % change to scale the graph
            let minPct = 0;
            let maxPct = 0;

            const normalizedData = {}; // { 'NVDA': [0, 0.1, -0.2, ...], ... }

            ASSETS.forEach(asset => {
                const history = marketData[asset.id];
                const startPrice = history[0].price;
                const pctHistory = history.map(pt => (pt.price - startPrice) / startPrice);
                
                normalizedData[asset.id] = pctHistory;
                
                const localMin = Math.min(...pctHistory);
                const localMax = Math.max(...pctHistory);
                minPct = Math.min(minPct, localMin);
                maxPct = Math.max(maxPct, localMax);
            });

            // Add padding
            const range = maxPct - minPct;
            const padding = range * 0.1 || 0.01; // Default padding if flat
            const yMin = minPct - padding;
            const yMax = maxPct + padding;
            const yRange = yMax - yMin;

            // Helper to map index/value to x/y
            const stepX = width / (MAX_POINTS - 1);
            const getY = (pct) => height - ((pct - yMin) / yRange) * height;

            // 2. Draw Zero Line
            const zeroY = getY(0);
            ctx.beginPath();
            ctx.moveTo(0, zeroY);
            ctx.lineTo(width, zeroY);
            ctx.strokeStyle = '#3f3f46';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // 3. Draw Secondary Assets first (so Primary is on top)
            ASSETS.forEach(asset => {
                if (asset.isPrimary) return;
                
                const data = normalizedData[asset.id];
                ctx.beginPath();
                data.forEach((pct, i) => {
                    const x = i * stepX;
                    const y = getY(pct);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.strokeStyle = asset.color;
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // 4. Draw Primary Asset (Filled Area)
            const primary = ASSETS.find(a => a.isPrimary);
            const pData = normalizedData[primary.id];
            const isPos = pData[pData.length - 1] >= 0;
            const pColor = isPos ? '#10b981' : '#ef4444';

            // Area
            ctx.beginPath();
            ctx.moveTo(0, height); // Bottom left (technically should be zeroY if we want fill to zero, but fill to bottom looks better for "Area")
            // Actually, let's fill to bottom for the "Area" look
            
            pData.forEach((pct, i) => {
                const x = i * stepX;
                const y = getY(pct);
                ctx.lineTo(x, y);
            });
            ctx.lineTo((pData.length - 1) * stepX, height);
            ctx.closePath();

            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, isPos ? 'rgba(16, 185, 129, 0.2)' : 'rgba(239, 68, 68, 0.2)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fill();

            // Line
            ctx.beginPath();
            pData.forEach((pct, i) => {
                const x = i * stepX;
                const y = getY(pct);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.strokeStyle = pColor;
            ctx.lineWidth = 4;
            ctx.shadowColor = pColor;
            ctx.shadowBlur = 10;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // --- Clock ---
        function updateClock() {
            const now = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            els.clock.textContent = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }

        // --- Media Player Logic ---
        const video = document.getElementById('videoElement');
        const btnPlay = document.getElementById('btnPlay');
        const btnMute = document.getElementById('btnMute');
        const btnExpand = document.getElementById('btnExpand');
        const fileInput = document.getElementById('fileInput');
        const mediaPlayer = document.getElementById('mediaPlayer');
        const muteIcon = document.getElementById('muteIcon');

        let isPlaying = false;

        btnPlay.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                btnPlay.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>'; // Pause icon
            } else {
                video.pause();
                btnPlay.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>'; // Play icon
            }
        });

        btnMute.addEventListener('click', () => {
            video.muted = !video.muted;
            if (video.muted) {
                muteIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>';
            } else {
                muteIcon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>';
            }
        });

        btnExpand.addEventListener('click', () => {
            mediaPlayer.classList.toggle('expanded');
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                video.src = url;
                video.play();
                btnPlay.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
            }
        });

        // --- Initialization ---
        initData();
        setInterval(updateData, 1000);
        setInterval(updateClock, 1000);
        updateClock();

        // Auto-play video if possible
        video.play().then(() => {
            isPlaying = true;
            btnPlay.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
        }).catch(() => {
            // Autoplay blocked
        });

    </script>
</body>
</html>
